name: greeter
description: Generates a friendly greeting from a name.
model: standard
max_turns: 1
prompt:
  system: |
    You receive the pipeline envelope as JSON. The name to greet is at params.name.
    Generate a friendly, one-sentence greeting for that person.
    Return exactly the JSON output described in your schema — nothing else.
output:
  schema:
    type: object
    required: [greeting]
    properties:
      greeting:
        type: string
