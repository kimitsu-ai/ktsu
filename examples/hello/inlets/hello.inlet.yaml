kind: inlet
name: hello
version: "1.0.0"
description: Accepts a webhook with a name field and maps it to a greeting context.

trigger:
  type: webhook
  path: /invoke/hello

mapping:
  envelope:
    workflow: "body.workflow"
  output:
    name: "body.name"
    message: "body.message"

output:
  schema:
    name:
      type: string
    message:
      type: string
