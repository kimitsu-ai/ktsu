kind: workflow
name: hello
version: "1.0.0"
description: Minimal hello-world workflow. Greets a name and sends the result via webhook.

params:
  schema:
    type: object
    required: [name]
    properties:
      name:
        type: string

env:
  - name: OUTPUT_WEBHOOK_URL
    secret: true
    description: "Webhook URL to send the greeting to"

pipeline:
  - id: greet
    agent: ./agents/greeter.agent.yaml

  - id: send
    webhook:
      url: "{{ env.OUTPUT_WEBHOOK_URL }}"
      method: POST
      body:
        greeting: "{{ step.greet.greeting }}"
        name: "{{ params.name }}"
    depends_on: [greet]
