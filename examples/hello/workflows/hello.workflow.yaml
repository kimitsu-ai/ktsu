kind: workflow
name: hello
version: "1.0.0"
description: Minimal hello-world workflow. Greets a name and sends the result via webhook.

input:
  schema:
    type: object
    required: [name]
    properties:
      name:
        type: string

pipeline:
  - id: greet
    agent: agents/greeter.agent.yaml

  - id: send
    webhook:
      url: "env:OUTPUT_WEBHOOK_URL"
      method: POST
      body:
        greeting: "greet.greeting"
        name: "input.name"
    depends_on: [greet]
