kind: workflow
name: ktsu/slack-input
version: "1.0.0"
visibility: sub-workflow
webhooks: suppress

params:
  schema:
    type: object
    required: [signing_secret, body, headers]
    properties:
      signing_secret:
        type: string
        description: "Slack signing secret for request verification"
      body:    { type: object }
      headers: { type: object }

pipeline:
  - id: validate
    transform:
      inputs:
        - from: input
      ops:
        - map:
            expr: "{ text: body.event.text, user_id: body.event.user, channel_id: body.event.channel, team_id: body.team_id }"
    output:
      schema:
        type: object
        properties:
          text:       { type: string }
          user_id:    { type: string }
          channel_id: { type: string }
          team_id:    { type: string }
