name: greeter
description: Generates a friendly greeting from a name.
model: standard
max_turns: 1
prompt:
  system: |
    You are a friendly greeter. Return exactly the JSON output described in your schema — nothing else.
  user: "Name: {{ params.name }}\nMessage: {{ params.message }}"
params:
  schema:
    type: object
    required: [name, message]
    properties:
      name:
        type: string
        description: "Name of the person to greet"
      message:
        type: string
        description: "Message from the user"
output:
  schema:
    type: object
    required: [greeting]
    properties:
      greeting:
        type: string
